<!DOCTYPE html>
<html>
<head>
    <title>UKZCM Portal</title>
    <style>
        body { background: #121212; color: #fff; font-family: Arial; }
        .nav { padding: 10px; background: #222; display: flex; gap: 20px; }
        .content { padding: 20px; }
    </style>
</head>
<body>

<div class="nav">
    <span onclick="show('global')">Global Chat</span>
    <span onclick="show('profile')">Profil</span>
</div>

<div id="global" class="content">
    <div id="chat-box" style="height: 300px; overflow-y: scroll; border: 1px solid #333;"></div>
    <input type="text" id="msg-input"><button onclick="send()">Gönder</button>
</div>

<div id="profile" class="content" style="display:none;">
    <input type="text" id="name-input" placeholder="Yeni ismini gir">
    <button onclick="saveName()">Kaydet</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://ukzcmchatproje-default-rtdb.firebaseio.com/" };
    const db = getDatabase(initializeApp(firebaseConfig));

    // Sabit bir ID oluştur (Tarayıcıyı kapatsan bile ismin değişmez)
    let uid = localStorage.getItem("uid") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("uid", uid);

    window.saveName = () => {
        const newName = document.getElementById("name-input").value;
        set(ref(db, 'users/' + uid), { name: newName });
        alert("İsim güncellendi!");
    };

    window.send = () => {
        const text = document.getElementById("msg-input").value;
        push(ref(db, 'chat'), { uid: uid, text: text });
        document.getElementById("msg-input").value = "";
    };

    // Mesajları çek ve isimleri eşleştir
    onValue(ref(db, 'chat'), (s) => {
        const messages = s.val();
        onValue(ref(db, 'users'), (u) => {
            const users = u.val();
            document.getElementById("chat-box").innerHTML = "";
            for(let key in messages) {
                const m = messages[key];
                const senderName = users && users[m.uid] ? users[m.uid].name : "Misafir";
                document.getElementById("chat-box").innerHTML += `<div><b>${senderName}:</b> ${m.text}</div>`;
            }
        });
    });

    window.show = (id) => {
        document.getElementById('global').style.display = id == 'global' ? 'block' : 'none';
        document.getElementById('profile').style.display = id == 'profile' ? 'block' : 'none';
    };
</script>
</body>
</html>
